name: Cross-platform desktop

on:
  pull_request:
  workflow_dispatch:

jobs:
  native-package-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
          - os: macos-latest
            platform: darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - name: Package Windows directory app
        if: runner.os == 'Windows'
        run: npm run package:win
      - name: Smoke Windows packaged app
        if: runner.os == 'Windows'
        run: npm run smoke:packaged:win
      - name: Package macOS directory app
        if: runner.os == 'macOS'
        run: npm run package:mac
      - name: Smoke macOS packaged app
        if: runner.os == 'macOS'
        run: npm run smoke:packaged:mac
      - name: Upload packaged smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: packaged-smoke-${{ matrix.platform }}
          path: packaged-output/smoke-evidence-${{ matrix.platform }}.json
          if-no-files-found: error


